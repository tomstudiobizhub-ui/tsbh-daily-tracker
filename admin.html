<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access | TBOS v2.0</title>
    <link rel="icon" type="image/png" href="logo-192.png">
    <meta name="theme-color" content="#00D68F">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00D68F;
            --primary-dark: #00b87a;
            --secondary: #0047AB;
            --white: #ffffff;
            --black: #0a0a0a;
            --gray: #666666;
            --gray-light: #f5f5f5;
            --border: #e0e0e0;
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.12);
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 45px 40px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 3rem;
            color: var(--white);
            box-shadow: 0 8px 30px rgba(0, 214, 143, 0.4);
        }

        .app-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--black);
            margin-bottom: 8px;
        }

        .app-version {
            font-size: 0.9rem;
            color: var(--gray);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--black);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group label i { color: var(--primary); }

        .input-wrapper { position: relative; }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 1.1rem;
        }

        .form-group input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            background: var(--gray-light);
        }

        .form-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 214, 143, 0.15);
            background: var(--white);
        }

        .btn {
            width: 100%;
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            box-shadow: 0 6px 20px rgba(0, 214, 143, 0.4);
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 214, 143, 0.5); }

        .message {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 12px;
            font-weight: 600;
            display: none;
        }

        .message.error {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            border: 1px solid rgba(220, 53, 69, 0.3);
            display: block;
        }

        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 214, 143, 0.1);
            color: var(--primary-dark);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 15px;
        }

        .divider {
            margin: 25px 0;
            position: relative;
            text-align: center;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            background: var(--white);
            padding: 0 15px;
            color: var(--gray);
            font-size: 0.85rem;
            position: relative;
            z-index: 1;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 12px 20px;
            border-radius: 12px;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .back-link:hover { background: rgba(0, 71, 171, 0.1); }

        .footer {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--gray);
            line-height: 1.6;
        }

        .footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-cube"></i>
            </div>
            <h1 class="app-name">TBOS v2.0</h1>
            <p class="app-version">Admin Access Portal</p>

            <form id="admin-form" onsubmit="event.preventDefault(); checkAdmin();">
                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i>
                        Admin Password
                    </label>
                    <div class="input-wrapper">
                        <input type="password" id="admin-pass" placeholder="Enter admin password" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn" id="submit-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Access Dashboard</span>
                </button>
            </form>

            <div id="message" class="message"></div>

            <div class="security-badge">
                <i class="fas fa-shield-alt"></i>
                <span>Secure Admin Access</span>
            </div>

            <div class="divider">
                <span>or</span>
            </div>

            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Main App</span>
            </a>

            <div class="footer">
                <strong><i class="fas fa-code"></i> Built by Tomstudio Tech Academy</strong><br>
                TBOS v2.0 | Professional Operations Manager<br>
                <i class="fas fa-phone-alt"></i> 
                <a href="tel:+2348030827417">+234 803 082 7417</a>
            </div>
        </div>
    </div>

    <script>
        function checkAdmin() {
            const pass = document.getElementById('admin-pass').value;
            const message = document.getElementById('message');
            const submitBtn = document.getElementById('submit-btn');

            message.className = 'message';
            message.style.display = 'none';

            if (pass === '@admin123#') {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Accessing...</span>';

                sessionStorage.setItem('ts_admin_session', JSON.stringify({
                    role: 'admin',
                    hub: 'Head Office',
                    name: 'Super Admin',
                    staffId: 'ADMIN-001',
                    portfolio: 'Super Admin | Head Office',
                    isAdmin: true
                }));

                message.className = 'message';
                message.style.background = 'rgba(0, 214, 143, 0.1)';
                message.style.color = '#00b87a';
                message.style.border = '1px solid rgba(0, 214, 143, 0.3)';
                message.innerHTML = '<i class="fas fa-check-circle"></i> Login successful! Redirecting...';
                message.style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                message.className = 'message error';
                message.innerHTML = '<i class="fas fa-times-circle"></i> Invalid admin password.';
                message.style.display = 'block';

                const input = document.getElementById('admin-pass');
                input.style.animation = 'shake 0.5s ease';
                setTimeout(() => {
                    input.style.animation = '';
                    input.value = '';
                    input.focus();
                }, 500);
            }
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('admin-pass').focus();
        });
    </script>
</body>
</html>
